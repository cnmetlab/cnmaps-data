name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: Lint, validate and build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 build .

      - name: Lint with flake8
        run: python -m flake8 cnmaps_data

      - name: Validate data package
        run: python -m cnmaps_data.checker ./cnmaps_data

      - name: Build distributions
        run: python -m build
